version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: c8-executor-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: c8_executor
    ports:
      - "5438:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d c8_executor"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - c8_executor_pgdata:/var/lib/postgresql/data

  zookeeper:
    image: bitnami/zookeeper:3.9
    container_name: c8-executor-zookeeper
    environment:
      - ALLOW_ANONYMOUS_LOGIN=yes
    ports:
      - "2188:2181"

  kafka:
    image: bitnami/kafka:3.7
    container_name: c8-executor-kafka
    depends_on:
      - zookeeper
    ports:
      - "9098:9092"
    environment:
      - KAFKA_CFG_ZOOKEEPER_CONNECT=zookeeper:2181
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://localhost:9098
      - KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE=true
      - ALLOW_PLAINTEXT_LISTENER=yes

volumes:
  c8_executor_pgdata:
